# Prometheus scrape config for loopover self-host (#980 observability).
# Activated via: docker compose --profile observability up
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alerting + recording rule files. The glob is evaluated inside the container, where
# ./prometheus/rules is mounted at /etc/prometheus/rules (see docker-compose.yml).
rule_files:
  - /etc/prometheus/rules/*.yml

# Ship firing alerts to Alertmanager (reachable by its compose service name on 9093).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: loopover
    static_configs:
      - targets: ["loopover:8787"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Postgres internals from prometheus-community/postgres_exporter. The exporter service starts only with
  # the Postgres profiles; SQLite-only installs show this target as absent/down without firing alerts.
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s

  # GPU utilization/VRAM/temp/power from nvidia_gpu_exporter (#4367). The exporter starts only with
  # --profile gpu; on a non-GPU install this target just shows as absent/down, no alert fires on it.
  - job_name: gpu
    static_configs:
      - targets: ["gpu-exporter:9835"]
    scrape_interval: 15s

  # Backup freshness from the read-only backup-exporter sidecar. The metrics exist only when the backup
  # profile is active, which keeps backup alerts opt-in with the backup feature.
  - job_name: loopover-backup
    # The exporter is a tiny BusyBox httpd wrapper around Prometheus text output. Prometheus v3 rejects
    # blank Content-Type responses unless the scrape protocol is explicit.
    fallback_scrape_protocol: PrometheusText0.0.4
    static_configs:
      - targets: ["backup-exporter:9101"]
    scrape_interval: 60s

  # Claude Code usage telemetry, re-exposed by the OTEL collector's Prometheus exporter (--profile
  # observability + CLAUDE_CODE_ENABLE_TELEMETRY=1). An absent collector just shows the target as down.
  - job_name: claude-code-otel
    static_configs:
      - targets: ["otel-collector:8889"]
    scrape_interval: 15s

  # Host-level CPU/memory/disk/network from node-exporter (--profile observability, #5366). Bind-mounts
  # the HOST's own /proc, /sys, / read-only — no Docker API access needed for host-level stats.
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 15s

  # Per-container CPU/memory/network/disk-io from cAdvisor (--profile observability, #5366). Runs without
  # Docker socket access (see the cadvisor service's own comment in docker-compose.yml) — containers are
  # labeled by cgroup path/id rather than docker-compose service name.
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
    scrape_interval: 15s

  # Redis health (connected clients, memory, ops/sec, hit ratio) from the official sidecar exporter
  # (--profile observability, #5366). Redis itself is required and always-on; this just adds visibility.
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 15s

  # Qdrant's own native /metrics (--profile qdrant, #5366). Absent/down unless the Qdrant vector-store
  # profile is active — same "other profile" gating already used by postgres/gpu above.
  - job_name: qdrant
    static_configs:
      - targets: ["qdrant:6333"]
    scrape_interval: 30s

  # REES (review-enrichment service) request + per-analyzer metrics (--profile rees, #5367). Absent/down
  # unless the optional REES analyzer service is active — same "other profile" gating as postgres/gpu/qdrant.
  - job_name: rees
    static_configs:
      - targets: ["rees:8080"]
    scrape_interval: 15s

  # browserless queue/concurrency/rejection/error metrics, translated from its own JSON /metrics by the
  # browserless-exporter sidecar (--profile visual-review, #5368). Same BusyBox-httpd-wrapper shape as
  # loopover-backup above, so it needs the same explicit scrape protocol fallback.
  - job_name: browserless
    fallback_scrape_protocol: PrometheusText0.0.4
    static_configs:
      - targets: ["browserless-exporter:9102"]
    scrape_interval: 30s

  # Self-monitoring: the observability stack watching itself (--profile observability, #5366). Every
  # component here ships its own native Prometheus /metrics — previously scraped by nothing, so a stack
  # component silently degrading (e.g. Loki dropping ingested lines, Alertmanager failing to notify) had
  # zero visibility. otel-collector's own internal telemetry (distinct from :8889's re-exported Claude
  # Code metrics above) needs service.telemetry.metrics enabled in otel/otel-collector-config.yml.
  - job_name: observability-stack
    static_configs:
      - targets:
          - "prometheus:9090"
          - "alertmanager:9093"
          - "loki:3100"
          - "tempo:3200"
          - "grafana:3000"
          - "otel-collector:8888"
    scrape_interval: 30s
